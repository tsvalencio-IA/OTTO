    #lobby{max-width:1180px;margin:auto;padding:18px 14px 28px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}.brand{display:flex;align-items:center;gap:13px}.face{width:62px;height:62px;border-radius:18px;background:#080808;border:3px solid var(--brand);box-shadow:0 0 24px rgba(255,122,0,.35);position:relative}.face:before,.face:after{content:"";position:absolute;top:20px;width:17px;height:10px;background:#fff;border-radius:2px}.face:before{left:10px;box-shadow:7px 0 0 #f22}.face:after{right:10px;box-shadow:-7px 0 0 #f22}.brand small{display:block;color:var(--brand2);font-weight:700;text-transform:uppercase}.brand h1{margin:0;font-size:clamp(25px,6vw,42px);line-height:.95}.lobbyGrid{display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:18px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}.viewerCard{height:min(66vh,640px);min-height:430px;overflow:hidden;position:relative}.viewerCard model-viewer{width:100%;height:100%;background:radial-gradient(circle at 50% 42%,#26345c,#090d19)}.arNative{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);width:min(88%,340px);z-index:4}.side{display:flex;flex-direction:column;gap:14px}.panel{padding:18px}.panel h2{margin:0 0 12px;color:var(--brand2);font-size:23px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:18px;padding:13px;text-align:center}.stat span{display:block;color:var(--muted);font-size:12px;text-transform:uppercase}.stat b{display:block;font-size:32px;color:#fff}.actions{display:grid;gap:11px}.actions .btn{width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;font-size:19px}.difficulty{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.difficulty .btn{padding:10px 6px;font-size:13px}.difficulty .active{outline:3px solid var(--brand2)}

    .hud{position:absolute;left:10px;right:10px;top:max(10px,env(safe-area-inset-top));z-index:10;display:grid;gap:8px;pointer-events:none}.hudRow{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}.pill{background:rgba(8,12,24,.82);border:1px solid var(--line);backdrop-filter:blur(8px);padding:8px 13px;border-radius:999px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.35)}.pill b{color:var(--brand2);font-size:22px}.mission{max-width:720px;width:100%;margin:auto;background:rgba(8,12,24,.9);border:2px solid var(--info);border-radius:20px;padding:10px 12px;text-align:center;box-shadow:0 8px 30px rgba(24,186,255,.2)}.mission small{display:block;color:var(--info);text-transform:uppercase;font-weight:700;font-size:11px}.mission strong{display:block;font-size:18px;line-height:1.25}.guideNow{margin-top:7px;color:#061018;background:var(--brand2);display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;padding:5px 12px;font-size:14px}.steps{display:flex;justify-content:center;flex-wrap:wrap;gap:6px;margin-top:8px}.step{padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.08);font-size:12px;color:#aab4cc}.step.current{background:var(--brand2);color:#1b1000;transform:scale(1.05)}.step.done{background:var(--ok);color:#061408}.toast{position:absolute;top:39%;left:50%;transform:translate(-50%,-50%) scale(.7);z-index:50;opacity:0;background:rgba(8,12,24,.94);border:4px solid var(--ok);border-radius:28px;padding:16px 28px;text-align:center;font-weight:700;font-size:26px;box-shadow:0 25px 70px rgba(0,0,0,.7);transition:.22s}.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}.toast.error{border-color:var(--danger);color:#ff9bad}.toast.guide{border-color:var(--brand2);color:var(--brand2)}

    .controller{position:absolute;left:0;right:0;bottom:0;z-index:12;padding:9px 10px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(7,11,22,.70),rgba(7,11,22,.98) 25%);border-top:1px solid rgba(255,255,255,.14)}.worldBar{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px}.worldBar::-webkit-scrollbar{display:none}.worldBtn{flex:0 0 auto;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid var(--line);font-size:13px;font-weight:700}.worldBtn.active{background:var(--info);color:#06111a;border-color:#fff}.controllerMain{display:grid;grid-template-columns:126px minmax(0,1fr) 126px;align-items:center;gap:10px;max-width:850px;margin:0 auto}.dpad{display:grid;grid-template-columns:repeat(3,42px);grid-template-rows:repeat(3,42px);gap:2px;justify-content:center}.pad,.act,.util{background:linear-gradient(180deg,#2d3b66,#151d36);border:1px solid rgba(255,255,255,.18);border-radius:14px;box-shadow:0 5px 0 rgba(0,0,0,.5);font-weight:800}.pad:active,.act:active,.util:active{transform:translateY(5px);box-shadow:0 0 0 rgba(0,0,0,.5)}.pad.empty{visibility:hidden}.pad{font-size:22px}.centerLogo{display:grid;place-items:center;background:#05070f;color:var(--brand2);border-radius:15px;font-size:11px;font-weight:900;text-align:center;line-height:1.05}.actionsPad{display:grid;grid-template-columns:repeat(2,60px);grid-template-rows:repeat(2,60px);gap:8px;justify-content:center}.act{border-radius:50%;font-size:14px;display:flex;flex-direction:column;align-items:center;justify-content:center}.act b{font-size:20px;display:block}.act.a{background:linear-gradient(180deg,#69f291,#14a950)}.act.b{background:linear-gradient(180deg,#ff6a83,#c51635)}.act.x{background:linear-gradient(180deg,#63d9ff,#158fd2)}.act.y{background:linear-gradient(180deg,#d59bff,#7d31c5)}.utility{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;align-content:center}.util{min-height:48px;font-size:11px;text-transform:uppercase;color:#fff}.util b{display:block;font-size:18px}.ctrlTarget{outline:4px solid var(--brand2)!important;box-shadow:0 0 22px rgba(255,202,47,.9),0 5px 0 rgba(0,0,0,.5)!important;animation:pulseTarget .8s infinite alternate}@keyframes pulseTarget{from{filter:brightness(1)}to{filter:brightness(1.45)}}.wrongFlash{animation:shake .35s}@keyframes shake{10%,90%{transform:translateX(-3px)}20%,80%{transform:translateX(5px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
    @media(max-width:760px){.lobbyGrid{grid-template-columns:1fr}.viewerCard{height:48vh;min-height:330px}.side{gap:10px}.controllerMain{grid-template-columns:116px 1fr 116px;gap:6px}.dpad{grid-template-columns:repeat(3,38px);grid-template-rows:repeat(3,38px)}.actionsPad{grid-template-columns:repeat(2,54px);grid-template-rows:repeat(2,54px);gap:7px}.utility{grid-template-columns:repeat(3,1fr);grid-auto-rows:43px}.mission strong{font-size:16px}.hud{top:6px}.pill{padding:6px 10px;font-size:14px}.pill b{font-size:18px}}
    @media(max-width:410px){.controllerMain{grid-template-columns:102px 1fr 102px}.dpad{grid-template-columns:repeat(3,33px);grid-template-rows:repeat(3,33px)}.pad{font-size:18px;border-radius:10px}.actionsPad{grid-template-columns:repeat(2,47px);grid-template-rows:repeat(2,47px)}.act{font-size:10px}.act b{font-size:17px}.util{font-size:9px;min-height:39px}.util b{font-size:15px}.controller{padding-left:6px;padding-right:6px}.worldBtn{font-size:11px;padding:7px 9px}.mission{padding:8px}.steps{display:none}}

    .modal{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.82);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:14px}.modal.active{display:flex}.modalBox{width:min(560px,100%);max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:21px}.modalTop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:14px}.modalTop h3{margin:0;color:var(--brand2);font-size:26px}.close{width:42px;height:42px;border-radius:14px;background:rgba(255,255,255,.1);font-weight:900}.quizOptions{display:grid;gap:10px}.quizOptions .btn{text-align:left}.chatInput{width:100%;padding:14px;border-radius:16px;background:rgba(0,0,0,.35);border:1px solid var(--line);color:#fff;margin-bottom:10px}.bubble{min-height:88px;background:rgba(255,202,47,.08);border:2px dashed var(--brand2);border-radius:18px;padding:17px;text-align:center;color:var(--brand2);display:flex;align-items:center;justify-content:center}.collection{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.badgeItem{background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:18px;padding:14px;text-align:center}.badgeItem.locked{opacity:.42;filter:grayscale(1)}.badgeItem .emoji{font-size:34px;display:block}.badgeItem strong{display:block}.badgeItem small{display:block;color:var(--muted)}
  </style>
</head>
<body>
  <main id="lobby">
    <header class="top">
      <div class="brand"><div class="face" aria-hidden="true"></div><div><small>Controle preciso v10</small><h1>Athos: Guardião dos Portais</h1></div></div>
    </header>
    <section class="lobbyGrid">
      <div class="card viewerCard">
        <model-viewer id="nativeViewer" src="./athos.glb" alt="Athos 3D" camera-controls auto-rotate rotation-per-second="24deg" ar ar-modes="webxr scene-viewer quick-look" ar-placement="floor" shadow-intensity="1.4" shadow-softness="0.5" exposure="1.2" environment-image="neutral" scale="0.85 0.85 0.85" camera-orbit="0deg 74deg 3.7m">
          <button slot="ar-button" class="btn primary arNative" type="button">📱 Projetar em AR Nativo</button>
        </model-viewer>
      </div>
      <aside class="side">
        <section class="card panel"><h2>Progresso do Otto</h2><div class="stats"><div class="stat"><span>Pontos</span><b id="lobbyPoints" class="pixel">0</b></div><div class="stat"><span>Vidas</span><b id="lobbyHearts" class="pixel">3</b></div><div class="stat"><span>Medalhas</span><b id="lobbyMedals" class="pixel">0</b></div><div class="stat"><span>Fase</span><b id="lobbyLevel" class="pixel">1</b></div></div></section>
        <section class="card panel"><h2>Dificuldade</h2><div class="difficulty"><button class="btn diffBtn active" data-diff="easy">Fácil</button><button class="btn diffBtn" data-diff="medium">Médio</button><button class="btn diffBtn" data-diff="hard">Difícil</button></div></section>
        <section class="card panel"><h2>Modos</h2><div class="actions"><button id="playMissions" class="btn primary" type="button">🎮 Jogar missões <span>▶</span></button><button id="playFree" class="btn ok" type="button">🌍 Brincar livre <span>▶</span></button><button id="openQuizLobby" class="btn info" type="button">🧠 Quiz do Athos</button><button id="openAskLobby" class="btn" type="button">💬 Falar com Athos</button><button id="openCollection" class="btn" type="button">🏅 Coleção</button><button id="resetGame" class="btn danger" type="button">🔄 Resetar</button></div></section>
      </aside>
    </section>
  </main>

  <section id="game" class="bg-real" aria-label="Jogo Athos">
    <video id="gameCamera" class="gameCamera" autoplay playsinline muted></video>
    <div id="threeWrap"></div>
    <div id="gameHud" class="hud"><div class="hudRow"><div class="pill">⭐ <b id="hudPoints" class="pixel">0</b></div><div class="pill">❤️ <b id="hudHearts" class="pixel">3</b></div><div class="pill">🏅 <b id="hudMedals" class="pixel">0</b></div></div><div class="mission"><small id="worldLabel">Mundo Real</small><strong id="missionText">Preparando missão...</strong><div id="guideNow" class="guideNow">🎮 Aperte: <b id="expectedLabel">---</b></div><div id="missionSteps" class="steps"></div></div></div>
    <div id="toast" class="toast">OK</div>
    <footer class="controller">
      <div id="worldBar" class="worldBar"><button class="worldBtn active" data-world="real">📷 Real</button><button class="worldBtn" data-world="field">🟩 Campo</button><button class="worldBtn" data-world="fire">🔥 Vulcão</button><button class="worldBtn" data-world="forest">🌳 Floresta</button><button class="worldBtn" data-world="castle">🏰 Castelo</button><button class="worldBtn" data-world="space">🚀 Espaço</button></div>
      <div class="controllerMain">
        <div class="dpad" aria-label="Direcional"><button class="pad empty" tabindex="-1"></button><button class="pad" data-action="jump" data-key="jump">▲</button><button class="pad empty" tabindex="-1"></button><button class="pad" data-action="left" data-key="left">◀</button><div class="centerLogo">ATHOS<br>CTRL</div><button class="pad" data-action="right" data-key="right">▶</button><button class="pad empty" tabindex="-1"></button><button class="pad" data-action="crouch" data-key="crouch">▼</button><button class="pad empty" tabindex="-1"></button></div>
        <div class="utility"><button class="util" data-action="mini" data-key="mini"><b>🤏</b>Mini</button><button class="util" data-action="normal" data-key="normal"><b>🧍</b>Normal</button><button class="util" data-action="giant" data-key="giant"><b>🦾</b>Gigante</button><button class="util" data-open="ask" data-key="ask"><b>💬</b>Falar</button><button class="util" data-open="quiz" data-key="quiz"><b>🧠</b>Quiz</button><button id="exitGame" class="util" type="button"><b>⏹</b>Sair</button></div>
        <div class="actionsPad" aria-label="Botões de ação"><button class="act y" data-action="spin" data-key="spin"><b>Y</b>Girar</button><button class="act x" data-action="power" data-key="power"><b>X</b>Poder</button><button class="act b" data-action="crouch" data-key="crouch"><b>B</b>Abaixar</button><button class="act a" data-action="jump" data-key="jump"><b>A</b>Pular</button></div>
      </div>
    </footer>
  </section>

  <div id="quizModal" class="modal"><div class="modalBox"><div class="modalTop"><h3>🧠 Quiz do Athos</h3><button class="close" data-close type="button">X</button></div><p id="quizQuestion" style="font-size:22px;font-weight:700;text-align:center">Pergunta</p><div id="quizOptions" class="quizOptions"></div><p id="quizFeedback" style="text-align:center;color:var(--brand2);font-weight:700"></p></div></div>
  <div id="askModal" class="modal"><div class="modalBox"><div class="modalTop"><h3>💬 Falar com Athos</h3><button class="close" data-close type="button">X</button></div><input id="askInput" class="chatInput" placeholder="Pergunte sobre fogo, portal, Otto..." autocomplete="off" /><div style="display:flex;gap:9px;margin-bottom:12px"><button id="askSend" class="btn primary" type="button" style="flex:1">Enviar</button><button id="askVoice" class="btn info" type="button">🎙️</button></div><div id="askResponse" class="bubble">Olá Otto! Vamos proteger os portais?</div></div></div>
  <div id="collectionModal" class="modal"><div class="modalBox"><div class="modalTop"><h3>🏅 Coleção do Otto</h3><button class="close" data-close type="button">X</button></div><div id="collectionGrid" class="collection"></div></div></div>

<script>
(() => {
  'use strict';
  const $ = (s) => document.querySelector(s);
  const $$ = (s) => Array.from(document.querySelectorAll(s));

  const state = {
    points: Number(localStorage.getItem('athos_v10_points') || 0),
    hearts: Number(localStorage.getItem('athos_v10_hearts') || 3),
    medals: JSON.parse(localStorage.getItem('athos_v10_medals') || '[]'),
    level: Number(localStorage.getItem('athos_v10_level') || 1),
    difficulty: localStorage.getItem('athos_v10_difficulty') || 'easy',

  const labels = {left:'Esquerda', right:'Direita', jump:'Pular', crouch:'Abaixar', spin:'Girar', power:'Poder', giant:'Gigante', mini:'Mini', normal:'Normal', quiz:'Quiz', ask:'Falar'};
  const worlds = {
    real:{label:'Mundo Real',emoji:'📷',bg:null,floor:null,portal:0xffffff}, field:{label:'Campo dos Blocos',emoji:'🟩',bg:0x87ceeb,floor:0x3b7f2a,portal:0x20d866},
    fire:{label:'Vulcão Pixel',emoji:'🔥',bg:0x1b0500,floor:0x2a0800,portal:0xff5e00}, forest:{label:'Floresta Voxel',emoji:'🌳',bg:0x87ceeb,floor:0x245c24,portal:0x20d866},
    castle:{label:'Castelo de Pedra',emoji:'🏰',bg:0x141622,floor:0x4a4a5c,portal:0x18baff}, space:{label:'Espaço Cubo',emoji:'🚀',bg:0x050510,floor:0x111122,portal:0xb264ff}
  };
  const missions = [
    {world:'field',text:'Treino: use o direcional para ir para a direita.',seq:['right'],target:'crystalRight'},
    {world:'fire',text:'O chão é lava. Aperte A ou ▲ para pular.',seq:['jump'],target:'lava'},
    {world:'forest',text:'Túnel baixo. Aperte B ou ▼ para abaixar.',seq:['crouch'],target:'tunnel'},
    {world:'space',text:'Portal instável. Aperte Y para girar.',seq:['spin'],target:'portal'},
    {world:'fire',text:'Bloco escuro. Aperte X para usar poder.',seq:['power'],target:'darkBlock'},
    {world:'castle',text:'Portão pesado. Fique gigante.',seq:['giant'],target:'gate'},
    {world:'forest',text:'Passagem pequena. Fique mini.',seq:['mini'],target:'smallHole'},
    {world:'field',text:'Volte ao tamanho normal.',seq:['normal'],target:'portal'},
    {world:'castle',text:'Sequência do castelo: esquerda, pular e girar.',seq:['left','jump','spin'],target:'castleRun'},
    {world:'real',text:'Desafio da sabedoria: abra o Quiz e acerte.',seq:['quiz'],target:'portal'},
    {world:'real',text:'Converse com o Athos: abra Falar e envie uma pergunta.',seq:['ask'],target:'portal'}
  ];
  const quizData = [
    {q:'Qual é a magia principal do Athos?',opts:['Água','Fogo pixelado','Gelo'],ans:1,exp:'Isso! O Athos usa fogo pixelado.'},
    {q:'Quem é o parceiro do Athos?',opts:['Otto','Um zumbi','Um foguete'],ans:0,exp:'Certo! O Otto é o parceiro do Athos.'},
    {q:'Qual botão faz o Athos pular?',opts:['A / ▲','X / Poder','Mini'],ans:0,exp:'Perfeito! A ou ▲ faz pular.'},
    {q:'O que abre portais no jogo?',opts:['Missões completas','Dormir','Fechar o app'],ans:0,exp:'Boa! As missões completas carregam os portais.'}
  ];
  const medalCatalog = [
    {id:'first',emoji:'⭐',title:'Primeira Missão',desc:'Completou a primeira missão.'}, {id:'fire',emoji:'🔥',title:'Guardião do Fogo',desc:'Venceu no vulcão.'},
    {id:'castle',emoji:'🏰',title:'Herói do Castelo',desc:'Passou pelo castelo.'}, {id:'quiz',emoji:'🧠',title:'Campeão do Quiz',desc:'Acertou o quiz.'},
    {id:'streak5',emoji:'⚡',title:'Sequência 5',desc:'Chegou na fase 5.'}, {id:'real',emoji:'📷',title:'Mundo Real',desc:'Brincou com a câmera.'}
  ];

  let scene, camera, renderer, clock, player, athos, portal, targetObj, resizeBound=false, rafStarted=false;
  let props=[], particles=[], cameraStream=null, currentMission=null, stepIdx=0, missionLocked=false;
  let p={x:0,tx:0,y:0,vy:0,jump:false,scale:1,tscale:1,rot:0,trot:0,squash:1,tsquash:1};

  function save(){localStorage.setItem('athos_v10_points',state.points);localStorage.setItem('athos_v10_hearts',state.hearts);localStorage.setItem('athos_v10_medals',JSON.stringify(state.medals));localStorage.setItem('athos_v10_level',state.level);localStorage.setItem('athos_v10_difficulty',state.difficulty);updateStats();}
  function updateStats(){['lobbyPoints','hudPoints'].forEach(id=>{const e=$('#'+id);if(e)e.textContent=state.points});['lobbyHearts','hudHearts'].forEach(id=>{const e=$('#'+id);if(e)e.textContent=state.hearts});['lobbyMedals','hudMedals'].forEach(id=>{const e=$('#'+id);if(e)e.textContent=state.medals.length});const l=$('#lobbyLevel');if(l)l.textContent=state.level;$$('.diffBtn').forEach(b=>b.classList.toggle('active',b.dataset.diff===state.difficulty));}
  function speak(txt){try{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.lang='pt-BR';u.rate=1.02;u.pitch=1.15;window.speechSynthesis.speak(u)}catch(e){}}
  function toast(msg,type='ok'){const t=$('#toast');t.textContent=msg;t.className='toast show '+(type==='error'?'error':type==='guide'?'guide':'');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),1800)}
  function medal(id){if(!state.medals.includes(id)){state.medals.push(id);save();toast('Nova medalha!','ok')}}

  async function startCam(){if(cameraStream)return;try{cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});$('#gameCamera').srcObject=cameraStream;if(state.world==='real')medal('real')}catch(e){toast('Câmera bloqueada. Use cenário 3D.','guide');changeWorld('field')}}
  function stopCam(){if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null}$('#gameCamera').srcObject=null}

  function init3D(){if(renderer)return;const wrap=$('#threeWrap');scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x000000,.03);camera=new THREE.PerspectiveCamera(55,wrap.clientWidth/wrap.clientHeight,.1,100);camera.position.set(0,3.2,9);camera.lookAt(0,1,0);renderer=new THREE.WebGLRenderer({alpha:true,antialias:true});renderer.domElement.id='three-canvas';renderer.setSize(wrap.clientWidth,wrap.clientHeight);renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;wrap.appendChild(renderer.domElement);clock=new THREE.Clock();scene.add(new THREE.HemisphereLight(0xffffff,0x29304a,.7));const d=new THREE.DirectionalLight(0xffffff,1);d.position.set(4,10,6);d.castShadow=true;d.shadow.mapSize.set(1024,1024);scene.add(d);player=new THREE.Group();scene.add(player);loadAthos();if(!resizeBound){resizeBound=true;window.addEventListener('resize',resize3D)}if(!rafStarted){rafStarted=true;animate()}}
  function resize3D(){if(!renderer)return;const w=$('#threeWrap');camera.aspect=w.clientWidth/w.clientHeight;camera.updateProjectionMatrix();renderer.setSize(w.clientWidth,w.clientHeight)}
  function loadAthos(){new THREE.GLTFLoader().load('./athos.glb',g=>{athos=g.scene;athos.scale.set(.9,.9,.9);const box=new THREE.Box3().setFromObject(athos);athos.position.y=-box.min.y;athos.traverse(c=>{if(c.isMesh){c.castShadow=true;c.receiveShadow=true}});player.add(athos)},undefined,()=>{athos=fallbackAthos();player.add(athos)})}
  function fallbackAthos(){const g=new THREE.Group(),body=new THREE.MeshStandardMaterial({color:0x111111,roughness:.8}),fire=new THREE.MeshStandardMaterial({color:0xff5e00,emissive:0x771500});[['body',1.2,1.5,.8,0,.75,0,body],['head',1,1,1,0,2,0,body],['armL',.35,1.1,.35,-.85,.9,0,fire],['armR',.35,1.1,.35,.85,.9,0,fire]].forEach(a=>{const m=new THREE.Mesh(new THREE.BoxGeometry(a[1],a[2],a[3]),a[7]);m.position.set(a[4],a[5],a[6]);m.castShadow=true;m.receiveShadow=true;g.add(m)});return g}
  function mat(c,em=0){return new THREE.MeshStandardMaterial({color:c,emissive:em,roughness:.85})}
  function addBox(x,y,z,w,h,d,c,em=0){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(c,em));m.position.set(x,y,z);m.castShadow=true;m.receiveShadow=true;scene.add(m);props.push(m);return m}
  function tree(x,z){const g=new THREE.Group();const tr=new THREE.Mesh(new THREE.BoxGeometry(.7,2,.7),mat(0x5a351e));tr.position.y=1;const lf=new THREE.Mesh(new THREE.BoxGeometry(2.1,2.1,2.1),mat(0x20b956));lf.position.y=3;g.add(tr,lf);g.position.set(x,0,z);g.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true}});scene.add(g);props.push(g)}
  function clearWorld(){props.forEach(o=>scene.remove(o));props=[];if(portal){scene.remove(portal);portal=null}if(targetObj){scene.remove(targetObj);targetObj=null}}
  function buildWorld(type){clearWorld();const conf=worlds[type]||worlds.real;const game=$('#game');game.classList.remove('bg-real','bg-field','bg-fire','bg-forest','bg-castle','bg-space');game.classList.add('bg-'+type);if(type==='real'){scene.background=null;scene.fog.density=0}else{scene.background=new THREE.Color(conf.bg);scene.fog.color.setHex(conf.bg);scene.fog.density=.032}const floorMat=type==='real'?new THREE.ShadowMaterial({opacity:.35}):mat(conf.floor);const floor=new THREE.Mesh(new THREE.PlaneGeometry(70,70),floorMat);floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);props.push(floor);if(type==='field'){for(let i=-5;i<=5;i+=2)addBox(i,.15,-5,.9,.3,.9,0x61a934)}if(type==='fire'){addBox(-3,1.2,-3,2,2.4,2,0x121212);addBox(2,.08,-3,5,.16,4,0xff3300,0x9b1200);addBox(4,.4,-5,1,.8,1,0xff8a00,0x552200)}if(type==='forest'){tree(-4,-4);tree(4,-5);tree(1,-8)}if(type==='castle'){addBox(-4,2,-4,1.5,4,1.5,0x666677);addBox(4,2,-4,1.5,4,1.5,0x666677);addBox(0,3.3,-4,6,1,1,0x555566)}if(type==='space'){for(let i=0;i<16;i++)addBox(Math.random()*18-9,Math.random()*6+1,-5-Math.random()*10,.35,.35,.35,0xffffff,0x5577aa)}makePortal(conf.portal);makeTarget(currentMission&&currentMission.target)}
  function makePortal(color){portal=new THREE.Group();const frame=mat(0x191919);[['l',-.15,2.2,0,.55,4.4,.55],['r',.15,2.2,0,.55,4.4,.55],['t',0,4.6,0,4,.55,.55]].forEach((a,i)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(a[4],a[5],a[6]),frame);m.position.set(i===0?-1.75:i===1?1.75:0,a[2],0);m.castShadow=true;portal.add(m)});const glow=new THREE.Mesh(new THREE.PlaneGeometry(3,4),new THREE.MeshBasicMaterial({color,transparent:true,opacity:.55,side:THREE.DoubleSide}));glow.position.y=2.3;portal.add(glow);portal.position.set(0,0,-7);scene.add(portal)}
  function makeTarget(kind){if(!kind)return;const z=-2.3;if(kind==='lava')targetObj=addBox(0,.12,z,2.4,.24,1.2,0xff3300,0xaa1100);if(kind==='tunnel')targetObj=addBox(0,1.6,z,4,.45,.8,0x8a5b33);if(kind==='crystalRight')targetObj=addBox(3,1,z,.7,1.4,.7,0x1edcff,0x006688);if(kind==='darkBlock')targetObj=addBox(0,1,z,1.2,1.2,1.2,0x050505);if(kind==='gate')targetObj=addBox(0,1.6,z,3,3.2,.6,0x555560);if(kind==='smallHole')targetObj=addBox(0,.8,z,1.3,1.6,.6,0x294725);if(kind==='castleRun')targetObj=addBox(-2.8,1,z,.8,2,.8,0xffca2f,0x332200)}
  function changeWorld(w){state.world=w;$$('.worldBtn').forEach(b=>b.classList.toggle('active',b.dataset.world===w));const conf=worlds[w]||worlds.real;$('#worldLabel').textContent=conf.emoji+' '+conf.label;if(w==='real')startCam();else stopCam();if(renderer)buildWorld(w)}

  function spawnParticles(kind='power'){if(!scene)return;const count=kind==='win'?50:22;for(let i=0;i<count;i++){const c=kind==='win'?Math.random()*0xffffff:0xff7a00;const mesh=new THREE.Mesh(new THREE.BoxGeometry(.2,.2,.2),new THREE.MeshBasicMaterial({color:c}));mesh.position.set(p.x,p.y+1.4,0);scene.add(mesh);particles.push({m:mesh,life:1+Math.random()*.7,vx:(Math.random()-.5)*.22,vy:Math.random()*.25+.08,vz:(Math.random()-.5)*.22})}}
  function animate(){requestAnimationFrame(animate);if(!renderer||state.mode==='lobby')return;const dt=Math.min(clock.getDelta(),.08);if(p.jump){p.vy-=28*dt;p.y+=p.vy*dt;if(p.y<=0){p.y=0;p.vy=0;p.jump=false;p.tsquash=1}}p.x+=(p.tx-p.x)*10*dt;p.scale+=(p.tscale-p.scale)*8*dt;p.rot+=(p.trot-p.rot)*8*dt;p.squash+=(p.tsquash-p.squash)*12*dt;if(player){player.position.set(p.x,p.y,0);player.rotation.y=p.rot;player.scale.set(p.scale,p.scale*p.squash,p.scale)}if(portal&&portal.children[3])portal.children[3].material.opacity=.38+Math.sin(Date.now()*.005)*.25;for(let i=particles.length-1;i>=0;i--){const q=particles[i];q.m.position.x+=q.vx;q.m.position.y+=q.vy;q.m.position.z+=q.vz;q.vy-=.7*dt;q.life-=dt;if(q.life<=0){scene.remove(q.m);particles.splice(i,1)}}renderer.render(scene,camera)}

  function setButtonsTarget(){const expected=currentMission?currentMission.seq[stepIdx]:null;$$('[data-key]').forEach(b=>b.classList.toggle('ctrlTarget',b.dataset.key===expected));$('#expectedLabel').textContent=expected?labels[expected]:'Livre';}
  function renderSteps(){const box=$('#missionSteps');box.innerHTML='';if(!currentMission)return;currentMission.seq.forEach((a,i)=>{const el=document.createElement('span');el.className='step '+(i<stepIdx?'done':i===stepIdx?'current':'');el.textContent=labels[a];box.appendChild(el)});setButtonsTarget()}
  function loadMission(){missionLocked=false;const idx=(state.level-1)%missions.length;currentMission=missions[idx];stepIdx=0;$('#missionText').textContent=currentMission.text;changeWorld(currentMission.world);renderSteps();speak(currentMission.text+' Agora aperte '+labels[currentMission.seq[0]])}
  function wrongAction(act){const expected=currentMission&&currentMission.seq[stepIdx];if(!expected)return;toast('Ainda não. Agora é: '+labels[expected],'guide');speak('Agora aperte '+labels[expected]);$('#gameHud').classList.remove('wrongFlash');void $('#gameHud').offsetWidth;$('#gameHud').classList.add('wrongFlash');if(state.difficulty==='hard'){state.hearts=Math.max(0,state.hearts-1);if(state.hearts===0){state.hearts=3;toast('Vidas recarregadas. Vamos tentar de novo.','guide');loadMission()}save()}}
  function checkMission(act){if(state.mode!=='missions'||!currentMission||missionLocked)return;const expected=currentMission.seq[stepIdx];if(act!==expected){wrongAction(act);return}stepIdx++;renderSteps();toast('Certo!','ok');if(stepIdx>=currentMission.seq.length){missionLocked=true;spawnParticles('win');state.points+=15+(state.difficulty==='hard'?10:state.difficulty==='medium'?5:0);state.level++;if(state.level===2)medal('first');if(currentMission.world==='fire')medal('fire');if(currentMission.world==='castle')medal('castle');if(state.level>=5)medal('streak5');save();speak('Missão completa! Próximo portal.');setTimeout(loadMission,1500)}else{speak('Muito bom. Agora aperte '+labels[currentMission.seq[stepIdx]])}}
  function action(act,btn){if(btn){btn.style.transform='scale(.92)';setTimeout(()=>btn.style.transform='',90)}if(act==='left')p.tx=Math.max(-4.5,p.tx-1.7);if(act==='right')p.tx=Math.min(4.5,p.tx+1.7);if(act==='jump'&&!p.jump){p.jump=true;p.vy=12;p.tsquash=1.12}if(act==='crouch'){p.tsquash=.52;setTimeout(()=>p.tsquash=1,650)}if(act==='spin')p.trot+=Math.PI*2;if(act==='giant')p.tscale=1.55;if(act==='mini')p.tscale=.52;if(act==='normal'){p.tscale=1;p.tsquash=1}if(act==='power')spawnParticles('power');checkMission(act)}

  function setMode(mode){state.mode=mode;$('#lobby').classList.toggle('hidden',mode!=='lobby');$('#game').classList.toggle('active',mode!=='lobby');if(mode==='lobby'){stopCam();currentMission=null;save();return}init3D();setTimeout(resize3D,60);p={x:0,tx:0,y:0,vy:0,jump:false,scale:1,tscale:1,rot:0,trot:0,squash:1,tsquash:1};if(mode==='missions'){if(state.hearts<=0)state.hearts=3;loadMission()}else{currentMission=null;$('#missionText').textContent='Brincadeira livre: use o controle para guiar o Athos.';$('#missionSteps').innerHTML='';$('#expectedLabel').textContent='Livre';changeWorld('real');setButtonsTarget()}save()}
  function openModal(id){$(id).classList.add('active')}function closeModal(el){el.closest('.modal').classList.remove('active')}
  function openQuiz(){const q=quizData[Math.floor(Math.random()*quizData.length)];$('#quizQuestion').textContent=q.q;$('#quizFeedback').textContent='';const opts=$('#quizOptions');opts.innerHTML='';q.opts.forEach((opt,i)=>{const b=document.createElement('button');b.className='btn';b.textContent=opt;b.onclick=()=>{opts.querySelectorAll('button').forEach(x=>x.disabled=true);if(i===q.ans){b.classList.add('ok');$('#quizFeedback').textContent=q.exp+' +5 pontos';state.points+=5;medal('quiz');save();checkMission('quiz');setTimeout(()=>closeModal(b),1200)}else{b.classList.add('danger');$('#quizFeedback').textContent='Quase! Tente outra pergunta depois.'}};opts.appendChild(b)});openModal('#quizModal')}
  function answerAthos(){const q=($('#askInput').value||'').toLowerCase();let r='Legal! O mundo do Athos é cheio de blocos, portais e aventuras.';if(q.includes('fogo')||q.includes('poder'))r='Meu poder é o fogo pixelado. Ele acende portais e quebra blocos escuros.';else if(q.includes('otto'))r='O Otto é meu parceiro guardião. Juntos nós protegemos os portais.';else if(q.includes('portal'))r='Os portais levam para o campo, vulcão, floresta, castelo, espaço e mundo real.';else if(q.includes('quem'))r='Eu sou o Athos, um personagem 3D blocado feito para brincar com o Otto.';$('#askResponse').textContent=r;$('#askInput').value='';speak(r);checkMission('ask')}
  function openCollection(){const grid=$('#collectionGrid');grid.innerHTML='';medalCatalog.forEach(m=>{const ok=state.medals.includes(m.id);const div=document.createElement('div');div.className='badgeItem '+(ok?'':'locked');div.innerHTML='<span class="emoji">'+(ok?m.emoji:'🔒')+'</span><strong>'+m.title+'</strong><small>'+m.desc+'</small>';grid.appendChild(div)});openModal('#collectionModal')}
  function reset(){if(confirm('Zerar pontos, vidas, fase e medalhas?')){state.points=0;state.hearts=3;state.medals=[];state.level=1;save()}}

  $('#playMissions').onclick=()=>setMode('missions');$('#playFree').onclick=()=>setMode('free');$('#exitGame').onclick=()=>setMode('lobby');$('#openQuizLobby').onclick=openQuiz;$('#openAskLobby').onclick=()=>openModal('#askModal');$('#openCollection').onclick=openCollection;$('#resetGame').onclick=reset;
  $$('[data-action]').forEach(b=>b.onclick=()=>action(b.dataset.action,b));$$('[data-open="quiz"]').forEach(b=>b.onclick=openQuiz);$$('[data-open="ask"]').forEach(b=>b.onclick=()=>openModal('#askModal'));$$('.worldBtn').forEach(b=>b.onclick=()=>{if(state.mode==='missions'){toast('No modo missão o mundo é escolhido pelo portal.','guide');return}changeWorld(b.dataset.world)});$$('[data-close]').forEach(b=>b.onclick=()=>closeModal(b));$$('.diffBtn').forEach(b=>b.onclick=()=>{state.difficulty=b.dataset.diff;save()});$('#askSend').onclick=answerAthos;$('#askInput').onkeydown=e=>{if(e.key==='Enter')answerAthos()};$('#askVoice').onclick=()=>{const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Voz não suportada neste navegador.','guide');return}const rec=new SR();rec.lang='pt-BR';rec.onresult=e=>{$('#askInput').value=e.results[0][0].transcript;answerAthos()};rec.start()};
  document.addEventListener('keydown',e=>{if(state.mode==='lobby')return;const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'jump',ArrowDown:'crouch',KeyA:'left',KeyD:'right',Space:'jump',KeyS:'crouch',KeyX:'power',KeyY:'spin',KeyG:'giant',KeyM:'mini',KeyN:'normal'};if(map[e.code]){e.preventDefault();action(map[e.code])}});
  const native=$('#nativeViewer');native.addEventListener('error',()=>toast('athos.glb não carregou. Verifique o arquivo.','error'));
  updateStats();
})();
</script>
</body>
</html>
